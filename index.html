<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>항공·호텔 서비스직 AI역량검사 체험판</title>
  <style>
    :root{--bg:#0b1324;--card:#111a31;--line:#263252;--text:#e8eeff;--sub:#9fb0dd;--pri:#5ea1ff;}
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(160deg,#081022,#0b1324 45%,#0d1730);color:var(--text);font-family:"Noto Sans KR","Malgun Gothic",sans-serif}
    .wrap{max-width:980px;margin:24px auto;padding:0 16px 40px}
    h1{margin:0 0 10px;font-size:26px}
    .card{margin-top:12px;background:rgba(17,26,49,.9);border:1px solid var(--line);border-radius:14px;padding:16px}
    .muted{color:var(--sub);font-size:14px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .col{flex:1 1 240px}
    label{display:block;font-size:13px;color:var(--sub);margin:8px 0 6px}
    input,select,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0d1630;color:var(--text)}
    textarea{min-height:100px}
    button{cursor:pointer;background:linear-gradient(120deg,#3c7cff,#4d90ff);border:none;font-weight:700}
    button.ghost{background:#0d1630;border:1px solid var(--line)}
    .qbox{padding:12px;border:1px solid var(--line);border-radius:10px;margin-top:10px}
    .likert{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px}
    .likert button{background:#132145;border:1px solid #2f4a87}
    .likert button.sel{background:#2a4f99}
    .kpi{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    .k{border:1px solid var(--line);border-radius:10px;padding:12px;background:#0f1a37}
    .n{font-size:24px;font-weight:800}
    .bar{border:1px solid #2b3f74;border-radius:10px;padding:10px;background:#0e1a38;margin-top:8px}
    .track{margin-top:6px;height:10px;background:#0b1326;border-radius:999px;overflow:hidden;border:1px solid #213059}
    .fill{height:100%;background:linear-gradient(90deg,#4e8dff,#2fd17f)}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>항공·호텔 서비스직 AI역량검사 체험판</h1>
    <section id="screen" class="card"></section>
  </div>

<script>
const SHEET_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwDo3mmebkSoZdhtWx2uacMUZdgYYm_XppdciQyTfzFsyhmE0mY6w14EUGyyK1HwkMbkA/exec";

const app = {
  step: 0,
  saved: false,
  profile: {},
  answers: { personality: {}, interview: {} },
  data: {
    personality: [
      {id:"P1",dim:"service",q:"고객 불만 상황에서 먼저 공감 표현을 한다."},
      {id:"P2",dim:"ethics",q:"규정 위반 요청은 관계와 무관하게 거절한다."},
      {id:"P3",dim:"stress",q:"혼잡 상황에서도 침착하게 우선순위를 정한다."},
      {id:"P4",dim:"team",q:"동료 과부하 시 자발적으로 업무를 분담한다."},
      {id:"P5",dim:"comm",q:"복잡한 안내를 간결하게 전달할 수 있다."},
      {id:"P6",dim:"problem",q:"문제 발생 시 원인-대안-후속조치를 구조화한다."}
    ]
  }
};

function setScreen(html){ document.getElementById("screen").innerHTML = html; }

function route(){
  if(app.step===0) intro();
  if(app.step===1) personality();
  if(app.step===2) interview();
  if(app.step===3) result();
}

function intro(){
  setScreen(`
    <div class="muted">교육용 체험판입니다. 실제 기업 전형과 동일하지 않습니다.</div>
    <div class="row">
      <div class="col"><label>성명</label><input id="name" placeholder="홍길동"></div>
      <div class="col"><label>학번</label><input id="sid" placeholder="20260001"></div>
      <div class="col"><label>학과/반</label><input id="dept" value="관광서비스계열"></div>
    </div>
    <div class="row">
      <div class="col"><label>트랙</label>
        <select id="track"><option value="airline">항공</option><option value="hotel">호텔</option></select>
      </div>
      <div class="col"><label>응시일</label><input id="date" type="date"></div>
    </div>
    <div class="row" style="margin-top:10px"><button onclick="saveIntro()">다음</button></div>
  `);
  document.getElementById("date").value = new Date().toISOString().slice(0,10);
}

function saveIntro(){
  const p = {
    name: document.getElementById("name").value.trim(),
    sid: document.getElementById("sid").value.trim(),
    dept: document.getElementById("dept").value.trim(),
    track: document.getElementById("track").value,
    date: document.getElementById("date").value
  };
  if(!p.name || !p.sid){ alert("성명/학번은 필수입니다."); return; }
  app.profile = p;
  app.step = 1;
  route();
}

function personality(){
  const qs = app.data.personality;
  let html = `<div class="muted">문항별로 1~5를 선택하세요.</div>`;
  qs.forEach((q,i)=>{
    const v = app.answers.personality[q.id] || 0;
    html += `<div class="qbox"><div>${i+1}. ${q.q}</div>
      <div class="likert">${[1,2,3,4,5].map(n=>`<button class="${v===n?'sel':''}" onclick="pick('${q.id}',${n})">${n}</button>`).join("")}</div>
    </div>`;
  });
  html += `<div class="row" style="margin-top:10px">
    <button class="ghost" onclick="app.step=0;route()">이전</button>
    <button onclick="toInterview()">다음</button>
  </div>`;
  setScreen(html);
}

function pick(id,n){ app.answers.personality[id]=n; personality(); }

function toInterview(){
  if(Object.keys(app.answers.personality).length < app.data.personality.length){
    alert("인성 문항을 모두 응답하세요."); return;
  }
  app.step = 2;
  route();
}

function interview(){
  setScreen(`
    <div class="qbox">
      <div><b>1)</b> 최근 갈등 해결 경험을 STAR(상황-과제-행동-결과)로 작성하세요.</div>
      <textarea id="iv1" placeholder="상황/과제/행동/결과"></textarea>
    </div>
    <div class="qbox">
      <div><b>2)</b> 규정 준수와 고객 만족이 충돌할 때 판단 기준을 작성하세요.</div>
      <textarea id="iv2" placeholder="판단 기준 + 실제 대응"></textarea>
    </div>
    <div class="row" style="margin-top:10px">
      <button class="ghost" onclick="app.step=1;route()">이전</button>
      <button onclick="submitInterview()">결과 보기</button>
    </div>
  `);
}

function submitInterview(){
  const iv1 = document.getElementById("iv1").value.trim();
  const iv2 = document.getElementById("iv2").value.trim();
  if(!iv1 || !iv2){ alert("면접답변 2개 모두 입력하세요."); return; }
  app.answers.interview = {iv1, iv2};
  app.step = 3;
  app.saved = false;
  route();
}

function scoreAll(){
  const d={service:0,ethics:0,stress:0,team:0,comm:0,problem:0};
  const c={service:0,ethics:0,stress:0,team:0,comm:0,problem:0};

  app.data.personality.forEach(q=>{
    const v=(Number(app.answers.personality[q.id]||3))*20;
    d[q.dim]+=v; c[q.dim]++;
  });
  Object.keys(d).forEach(k=>d[k]=c[k]?Math.round(d[k]/c[k]):50);

  const iv = ((app.answers.interview.iv1||"")+" "+(app.answers.interview.iv2||"")).toLowerCase();
  const kw = ["상황","과제","행동","결과","규정","안전","공정","대안","소통","협업","우선순위","재발방지"];
  let hit = 0; kw.forEach(k=>{ if(iv.includes(k)) hit++; });
  const ivScore = Math.min(100, 35 + hit*5 + Math.min(20, Math.floor(iv.length/40)));

  d.comm = Math.round(d.comm*0.75 + ivScore*0.25);
  d.ethics = Math.round(d.ethics*0.8 + ivScore*0.2);

  const cog = {mem:60, math:60, att:60, cog:60};
  const total = Math.round((d.service+d.ethics+d.stress+d.team+d.comm+d.problem)/6);

  return {dims:d, cog, ivScore, total};
}

function level(n){ if(n>=80) return "우수"; if(n>=65) return "양호"; if(n>=50) return "보통"; return "보완필요"; }

function bar(name,val){
  return `<div class="bar"><div style="display:flex;justify-content:space-between"><span>${name}</span><span>${val}</span></div><div class="track"><div class="fill" style="width:${Math.max(0,Math.min(100,val))}%"></div></div></div>`;
}

function result(){
  const s = scoreAll();
  const rec = [];
  if(s.dims.service<65) rec.push("고객 공감 + 대안 제시 30초 롤플레이 반복");
  if(s.dims.ethics<65) rec.push("규정-예외-보고 기준 사례 학습");
  if(s.dims.comm<65) rec.push("결론→근거→확인 질문 순 브리핑 훈련");
  if(rec.length===0) rec.push("현재 수준 유지 + STAR 답변 5개 사전 준비");

  setScreen(`
    <div class="kpi">
      <div class="k"><div class="muted">종합</div><div class="n">${s.total}</div><div>${level(s.total)}</div></div>
      <div class="k"><div class="muted">면접점수</div><div class="n">${s.ivScore}</div><div>${level(s.ivScore)}</div></div>
      <div class="k"><div class="muted">인지평균</div><div class="n">${s.cog.cog}</div><div>${level(s.cog.cog)}</div></div>
    </div>
    ${bar("고객지향",s.dims.service)}
    ${bar("윤리·규정준수",s.dims.ethics)}
    ${bar("스트레스 대응",s.dims.stress)}
    ${bar("협업",s.dims.team)}
    ${bar("커뮤니케이션",s.dims.comm)}
    ${bar("문제해결",s.dims.problem)}
    <div class="qbox"><b>개선 권고</b><ul>${rec.map(x=>`<li>${x}</li>`).join("")}</ul></div>
    <div class="row">
      <button class="ghost" onclick="saveToGoogleSheet()">구글시트 저장</button>
      <button class="ghost" onclick="downloadResult()">결과 JSON 다운로드</button>
      <button onclick="location.reload()">새 응시</button>
    </div>
  `);

  if(!app.saved){
    app.saved = true;
    saveToGoogleSheet(true);
  }
}

async function saveToGoogleSheet(silent=false){
  const payload = {
    profile: app.profile,
    answers: app.answers,
    scoredAt: new Date().toISOString(),
    result: scoreAll()
  };

  try{
    const res = await fetch(SHEET_WEBAPP_URL, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });
    const txt = await res.text();
    let data = {};
    try { data = JSON.parse(txt); } catch { data = {ok:false,message:txt}; }
    if(!data.ok) throw new Error(data.message || "저장 실패");
    if(!silent) alert("구글시트 저장 완료");
  }catch(e){
    if(!silent) alert("구글시트 저장 오류: " + e.message);
  }
}

function downloadResult(){
  const payload = {
    profile: app.profile,
    answers: app.answers,
    scoredAt: new Date().toISOString(),
    result: scoreAll()
  };
  const blob = new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `ai_assessment_${app.profile.sid || "student"}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

route();
</script>
</body>
</html>
