<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교수자 결과 조회 페이지</title>
  <style>
    body{margin:0;background:#0b1220;color:#e5e7eb;font-family:Arial,"Noto Sans KR",sans-serif}
    .wrap{max-width:1100px;margin:24px auto;padding:0 16px}
    .card{background:#111827;border:1px solid #334155;border-radius:14px;padding:14px;margin-top:12px}
    select,input,button,textarea{padding:10px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#e5e7eb}
    button{cursor:pointer;background:#2563eb;border:none}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .kpi{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    .box{background:#0f172a;border:1px solid #334155;border-radius:12px;padding:12px}
    .n{font-size:24px;font-weight:700}
    .bar{margin-top:8px;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px}
    .track{height:10px;background:#0b1220;border:1px solid #334155;border-radius:999px;overflow:hidden;margin-top:6px}
    .fill{height:100%;background:linear-gradient(90deg,#3b82f6,#22c55e)}
    table{width:100%;border-collapse:collapse}
    th,td{border-bottom:1px solid #334155;padding:8px;font-size:13px;text-align:left}
    textarea{width:100%;min-height:90px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="row">
      <input id="q" placeholder="학번 또는 이름 검색" style="min-width:220px" />
      <select id="studentSelect" style="min-width:280px"></select>
      <button onclick="loadStudent()">조회</button>
      <button onclick="loadList()">목록 새로고침</button>
    </div>
  </div>
  <div id="result" class="card">학생을 선택하세요.</div>
</div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwDo3mmebkSoZdhtWx2uacMUZdgYYm_XppdciQyTfzFsyhmE0mY6w14EUGyyK1HwkMbkA/exec";
let allStudents = [];

const lv = n => n>=80 ? "우수" : n>=65 ? "양호" : n>=50 ? "보통" : "보완필요";
const esc = s => String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const bar = (name,val) => {
  const v = Math.max(0, Math.min(100, Number(val)||0));
  return `<div class="bar"><div style="display:flex;justify-content:space-between"><span>${name}</span><span>${v}</span></div><div class="track"><div class="fill" style="width:${v}%"></div></div></div>`;
};

async function jget(url){
  const res = await fetch(url, { method:"GET" });
  if(!res.ok) throw new Error("HTTP " + res.status);
  return await res.json();
}

function renderList(list){
  const sel = document.getElementById("studentSelect");
  if(!list.length){ sel.innerHTML = `<option value="">데이터 없음</option>`; return; }
  sel.innerHTML = `<option value="">학생 선택</option>` + list.map(s => `<option value="${esc(s.sid)}">${esc(s.sid)} - ${esc(s.name)}</option>`).join("");
}

function bindSearch(){
  document.getElementById("q").addEventListener("input", e => {
    const k = e.target.value.trim().toLowerCase();
    if(!k) return renderList(allStudents);
    const f = allStudents.filter(s => s.sid.toLowerCase().includes(k) || (s.name||"").toLowerCase().includes(k));
    renderList(f);
  });
}

async function loadList(){
  try{
    const data = await jget(`${WEBAPP_URL}?api=list`);
    if(!data.ok) throw new Error(data.message || "목록 조회 실패");
    allStudents = data.students || [];
    renderList(allStudents);
  }catch(e){
    document.getElementById("result").textContent = "목록 조회 오류: " + e.message;
  }
}

async function loadStudent(){
  const sid = document.getElementById("studentSelect").value;
  if(!sid){ alert("학생을 선택하세요."); return; }

  try{
    const data = await jget(`${WEBAPP_URL}?api=student&sid=${encodeURIComponent(sid)}`);
    if(!data.ok) throw new Error(data.message || "조회 실패");
    draw(data);
  }catch(e){
    document.getElementById("result").textContent = "조회 오류: " + e.message;
  }
}

function draw(data){
  const el = document.getElementById("result");
  const a = data.attempts || [];
  if(!a.length){ el.textContent = "응시 기록이 없습니다."; return; }

  const x = a[0];
  const rows = a.map((r,i)=>`
    <tr>
      <td>${i+1}</td>
      <td>${new Date(r.timestamp).toLocaleString()}</td>
      <td>${esc(r.track||"")}</td>
      <td>${r.total}</td>
      <td>${r.comm}</td>
      <td>${r.ethics}</td>
      <td>${r.problem}</td>
    </tr>
  `).join("");

  el.innerHTML = `
    <h3 style="margin-top:0">${esc(x.name)} (${esc(x.sid)})</h3>
    <div class="kpi">
      <div class="box"><div>최신 종합</div><div class="n">${x.total}</div><div>${lv(x.total)}</div></div>
      <div class="box"><div>최신 인지평균</div><div class="n">${x.cog_avg}</div><div>${lv(x.cog_avg)}</div></div>
      <div class="box"><div>최신 면접점수</div><div class="n">${x.iv_score}</div><div>${lv(x.iv_score)}</div></div>
    </div>
    ${bar("고객지향",x.service)}
    ${bar("윤리·규정준수",x.ethics)}
    ${bar("스트레스 대응",x.stress)}
    ${bar("협업",x.team)}
    ${bar("커뮤니케이션",x.comm)}
    ${bar("문제해결",x.problem)}
    <div class="card" style="margin-top:12px">
      <div><b>면접답변(최신)</b></div>
      <div style="margin-top:8px">문항 1</div>
      <textarea readonly>${esc((x.interview||{}).iv1 || "")}</textarea>
      <div style="margin-top:8px">문항 2</div>
      <textarea readonly>${esc((x.interview||{}).iv2 || "")}</textarea>
    </div>
    <div class="card" style="margin-top:12px">
      <div><b>응시 이력</b></div>
      <table>
        <thead><tr><th>No</th><th>응시시각</th><th>트랙</th><th>종합</th><th>소통</th><th>윤리</th><th>문제해결</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

bindSearch();
loadList();
</script>
</body>
</html>
